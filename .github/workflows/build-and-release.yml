name: Build and Release

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'build.js'
      - 'package.json'
      - 'dist/**'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - name: Validate build
        run: npm run validate

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v$(date -u +'%Y%m%d.%H%M%S')"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "Automated release from src changes" \
            --latest
