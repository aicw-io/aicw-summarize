name: Build and Release

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'build.js'
      - 'package.json'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - run: npm run build

      - name: Check for dist changes
        id: diff
        run: |
          git diff --quiet dist/ && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Generate version tag
        if: steps.diff.outputs.changed == 'true'
        id: version
        run: echo "tag=v$(date -u +'%Y%m%d.%H%M%S')" >> "$GITHUB_OUTPUT"

      - name: Commit dist
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/
          git commit -m "build: update dist (${{ steps.version.outputs.tag }})"
          git push

      - name: Create release
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --notes "Automated build from src changes" \
            --latest
